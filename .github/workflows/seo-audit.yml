name: seo-agent · M2 tech audit

# M2 — еженедельный технический SEO-аудит. См. docs/seo/agent-system/план-реализации.md §M2.
# Cron: суббота 04:00 UTC = 07:00 МСК (после content-factory, до выходных).
# Также можно запустить вручную из Actions tab.

on:
  schedule:
    - cron: "0 4 * * 6"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Не слать в Telegram (true/false)"
        required: false
        default: "false"
      skip_psi:
        description: "Пропустить PageSpeed Insights (true/false)"
        required: false
        default: "false"

permissions:
  # M2 коммитит свежий аудит в data/audits/YYYY-MM-DD/ (только .md, .json в gitignore)
  contents: write

concurrency:
  group: seo-agent-m2
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 1

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: seo-agent/requirements.txt

      - name: Install dependencies
        working-directory: seo-agent
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # lxml нужен для BeautifulSoup, парсящего sitemap.xml
          pip install lxml

      - name: Configure git author
        run: |
          git config user.email "bot@example.com"
          git config user.name "seo-agent"

      - name: Run M2 tech audit
        working-directory: seo-agent
        env:
          M2_SITE_ROOT: https://www.distill-school.ru
          PSI_API_KEY: ${{ secrets.PSI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          SKIP_PSI: ${{ github.event.inputs.skip_psi || 'false' }}
        run: |
          ARGS=""
          if [ "$DRY_RUN" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ "$SKIP_PSI" = "true" ]; then ARGS="$ARGS --skip-psi"; fi
          python3 orchestrator.py m2 $ARGS

      - name: Commit & push отчёт (report.md + audit.json)
        if: success()
        run: |
          # audit.json нужен в репо: следующий прогон сравнивает с ним для дельты.
          git add seo-agent/data/audits/**/report.md seo-agent/data/audits/**/audit.json || true
          if ! git diff --staged --quiet; then
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "seo-agent: tech-audit ${DATE}

          M2 weekly audit · автогенерация · см. docs/seo/agent-system/план-реализации.md §M2"
            git push
          else
            echo "Нет изменений в аудите, пропускаю commit"
          fi

      - name: Upload audit artifacts (json + md)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-audit-${{ github.run_id }}
          path: seo-agent/data/audits/
          retention-days: 30
          if-no-files-found: warn
