name: seo-agent · M3 rank tracker

# M3 — ежедневный сбор позиций ключей.
# Cron: каждый день 03:00 UTC = 06:00 МСК (свежие данные GSC, после ночного обновления).

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      refresh_seeds:
        description: "Пересобрать список ключей из MDX + CSV"
        required: false
        default: "false"
      dry_run:
        description: "dry-run (без Telegram)"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: seo-agent-m3
  cancel-in-progress: false

jobs:
  rankings:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 1

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: seo-agent/requirements.txt

      - name: Install dependencies
        working-directory: seo-agent
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure git author
        run: |
          git config user.email "bot@example.com"
          git config user.name "seo-agent"

      - name: Run M3 rank tracker
        working-directory: seo-agent
        env:
          GSC_OAUTH_REFRESH_TOKEN: ${{ secrets.GSC_OAUTH_REFRESH_TOKEN }}
          GSC_OAUTH_CLIENT_ID: ${{ secrets.GSC_OAUTH_CLIENT_ID }}
          GSC_OAUTH_CLIENT_SECRET: ${{ secrets.GSC_OAUTH_CLIENT_SECRET }}
          GSC_SITE_URL: https://www.distill-school.ru/
          TOPVISOR_API_TOKEN: ${{ secrets.TOPVISOR_API_TOKEN }}
          TOPVISOR_PROJECT_ID: ${{ secrets.TOPVISOR_PROJECT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REFRESH_SEEDS: ${{ github.event.inputs.refresh_seeds || 'false' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          ARGS=""
          if [ "$REFRESH_SEEDS" = "true" ]; then ARGS="$ARGS --refresh-seeds"; fi
          if [ "$DRY_RUN" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python3 orchestrator.py m3 $ARGS

      - name: Commit & push снимок позиций
        if: success()
        run: |
          # rankings/*.json в gitignore (большие), но *.csv — нужны для дельты.
          git add seo-agent/data/rankings/*.csv seo-agent/data/rankings/tracked-keywords.json || true
          if ! git diff --staged --quiet; then
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "seo-agent: rankings ${DATE}

          M3 daily · позиции в Google (+ Яндекс если Topvisor)"
            git push
          else
            echo "Нет новых снимков, пропускаю commit"
          fi
