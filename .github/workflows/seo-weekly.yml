name: seo-agent · weekly digest

# Полный понедельничный отчёт: M4 (E-E-A-T), M5 (linker), digest по всем модулям.
# Cron: понедельник 08:00 UTC = 11:00 МСК — после ночного M3 и воскресного M1.

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "dry-run (без Telegram и без GitHub Issues)"
        required: false
        default: "false"

permissions:
  contents: write
  issues: write

concurrency:
  group: seo-agent-weekly
  cancel-in-progress: false

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 1

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: seo-agent/requirements.txt

      - name: Install dependencies
        working-directory: seo-agent
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure git author
        run: |
          git config user.email "bot@example.com"
          git config user.name "seo-agent"

      - name: Run M4 (E-E-A-T)
        working-directory: seo-agent
        env:
          SEO_AGENT_GITHUB_TOKEN: ${{ secrets.SEO_AGENT_GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          ARGS=""
          if [ "$DRY_RUN" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python3 orchestrator.py m4 $ARGS

      - name: Run M5 (linker)
        working-directory: seo-agent
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          ARGS=""
          if [ "$DRY_RUN" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python3 orchestrator.py m5 $ARGS

      - name: Run M6 (competitors)
        working-directory: seo-agent
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          ARGS=""
          if [ "$DRY_RUN" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python3 orchestrator.py m6 $ARGS || true

      - name: Run weekly digest
        working-directory: seo-agent
        env:
          GSC_OAUTH_REFRESH_TOKEN: ${{ secrets.GSC_OAUTH_REFRESH_TOKEN }}
          GSC_OAUTH_CLIENT_ID: ${{ secrets.GSC_OAUTH_CLIENT_ID }}
          GSC_OAUTH_CLIENT_SECRET: ${{ secrets.GSC_OAUTH_CLIENT_SECRET }}
          GSC_SITE_URL: https://www.distill-school.ru/
          YANDEX_WEBMASTER_TOKEN: ${{ secrets.YANDEX_WEBMASTER_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          ARGS=""
          if [ "$DRY_RUN" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python3 orchestrator.py digest $ARGS

      - name: Commit & push отчёты
        if: success()
        run: |
          git add seo-agent/reports/*.md seo-agent/data/eeat/*.json seo-agent/data/linker/*.json seo-agent/data/competitors/*.json || true
          if ! git diff --staged --quiet; then
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "seo-agent: weekly digest ${DATE}

          M4 + M5 + digest · автогенерация"
            git push
          else
            echo "Нет изменений в отчётах"
          fi
